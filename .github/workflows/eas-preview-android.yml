# Manual Android preview APK build for device QA (internal distribution).
#
# Required GitHub secret: EXPO_TOKEN
#   1. Log in at https://expo.dev and open Account Settings → Access Tokens
#   2. Create a token (Robot type recommended for CI) with EAS Build permissions
#   3. In GitHub: repo Settings → Secrets and variables → Actions → New repository secret
#   4. Name: EXPO_TOKEN   Value: paste the token (never commit it to the repo)
#
# Trigger: GitHub → Actions → "EAS Preview Android" → Run workflow
name: EAS Preview Android

on:
  workflow_dispatch:

jobs:
  build-preview-apk:
    name: EAS Build (Android preview APK)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: npm install -g eas-cli@latest

      - name: EAS Build — Android preview (APK)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive
