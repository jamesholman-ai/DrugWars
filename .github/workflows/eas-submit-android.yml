# Android Play Store submit — disabled until Google Play service account is configured.
#
# When ready:
#   1. Add GitHub secrets: EXPO_TOKEN, GOOGLE_SERVICE_ACCOUNT (service account JSON)
#   2. Remove `if: false` from the job and replace the placeholder step with:
#        - checkout, setup-node, npm ci, eas-cli install
#        - write GOOGLE_SERVICE_ACCOUNT to google-play-key.json
#        - eas submit --platform android --profile production --latest --non-interactive
#          env: EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
#
name: EAS Submit Android

on:
  workflow_dispatch:

jobs:
  submit-android:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Android submit workflow disabled until Google Play service account is configured."
